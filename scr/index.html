<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda Alejandra & Andres</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet">
<style>
        :root { --verde: #556b2f; --fondo: #ffffff; }
        body { margin: 0; padding: 0; background-color: var(--fondo); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* Efecto Reveal Profesional */
        .seccion { 
            width: 100vw; 
            max-width: 500px; 
            margin: 0 auto;
            position: relative; 
            opacity: 0; 
            transform: scale(0.95);
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            filter: blur(10px);
            margin-bottom: -5px; 
        }

        .seccion.active { 
            opacity: 1; 
            transform: scale(1);
            filter: blur(0px);
            margin-top: 20px;
            margin-bottom: 20px;
        }

        img { width: 100%; height: auto; display: block; }

        /* Contador Estético */
        #contador { 
            background: white;
            padding: 50px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            color: var(--verde);
        }
        .bloque { text-align: center; }
        .num { font-size: 2.5rem; display: block; font-weight: 300; }
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }

        /* Botones Invisibles */
        .boton-link { 
            position: absolute; 
            cursor: pointer; 
            background: rgba(0,0,0,0); /* Ponlo en 0.2 para probar ubicación */
            border: none; 
            z-index: 10;
        }

        /* Contenedor de Formulario Estético */
        .form-wrapper {
            width: 100%;
            max-width: 500px;
            margin: 40px auto;
            padding-bottom: 60px;
        }
        .form-titulo {
            text-align: center;
            color: var(--verde);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        iframe { width: 100%; border: none; min-height: 500px; }
    </style>
</head>
<body>

        <div class="seccion"><img src="img/sobre.png" alt="sobre"></div>
        <div class="seccion"><img src="img/portada.png" alt="portada"></div>
        <div class="seccion"><img src="img/fecha.png" alt="fecha"></div>
        
    <div id="contador" class="seccion">
        <div class="bloque"><span class="num" id="d">00</span><span class="label">Días</span></div>
        <div class="bloque"><span class="num" id="h">00</span><span class="label">Horas</span></div>
        <div class="bloque"><span class="num" id="m">00</span><span class="label">Min</span></div>
        <div class="bloque"><span class="num" id="s">00</span><span class="label">Seg</span></div>
    </div>
    <div class="seccion"><img src="img/padrinos.png" alt="padrinos"></div>
    <div class="seccion"><img src="img/DressCode.png" alt="dress code"></div>

    <div class="seccion">
    <img src="img/itinerario.png" alt="itinerario">
    <a href="https://maps.app.goo.gl/TuDominioUbicacionReal" target="_blank" class="boton-link" style="top: 15.2%; left: 29.5%; width: 41%; height: 3.8%;"></a>
    </div>

<div class="seccion">
    <!-- El id="img-pases" nos permitirá cambiar la imagen con JavaScript -->
    <img id="img-pases" src="img/4pases.png" alt="pases"> 
    
    <a href="https://maps.app.goo.gl/UbicacionCasaNovia" target="_blank" class="boton-link" style="top: 63.8%; left: 29.8%; width: 40.5%; height: 3.8%;"></a>
    
    <a href="https://maps.app.goo.gl/UbicacionCasaNovio" target="_blank" class="boton-link" style="top: 69.8%; left: 29.8%; width: 40.5%; height: 3.8%;"></a>
</div>


<div class="seccion form-wrapper">
        <h3 class="form-titulo">Confirmación de Asistencia</h3>
        <iframe 
            id="form-tally"
            src="https://tally.so/embed/81Jyax?pases=4&hideTitle=1&transparentBackground=1&dynamicHeight=1" 
            loading="lazy" 
            width="100%" 
            height="600" 
            frameborder="0" 
            marginheight="0" 
            marginwidth="0" 
            title="Confirmación de Asistencia">
        </iframe>
    </div>

<script>

    // 1. LEER EL LINK (Esto debe ir al principio del script)
    const urlParams = new URLSearchParams(window.location.search);
    const pases = urlParams.get('p') || '4'; // Si no hay número, usa 4 por defecto

    // 2. CAMBIAR LA IMAGEN DE LOS PASES
    const imagenPases = document.getElementById('img-pases');
    if (imagenPases) {
        // Esto cambia "img/4pases.png" por "img/1pases.png", etc.
        imagenPases.src = `img/${pases}pases.png`;
    }

    // 3. CAMBIAR EL FORMULARIO DE TALLY
    const iframeTally = document.querySelector('iframe');
    if (iframeTally) {
        iframeTally.src = `https://tally.so/embed/81Jyax?pases=${pases}&hideTitle=1&transparentBackground=1&dynamicHeight=1`;
    }


        // Reloj Regresivo
        const fin = new Date('June 20, 2026 15:15:00').getTime();
        setInterval(() => {
            const ahora = new Date().getTime();
            const diff = fin - ahora;
            document.getElementById('d').innerText = Math.floor(diff / (86400000));
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000);
        }, 1000);

        // Efecto de aparición y desaparición (Intersection Observer)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                } else {
                    entry.target.classList.remove('active');
                }
            });
        }, { threshold: 0.2 });

        document.querySelectorAll('.seccion').forEach(s => observer.observe(s));

    </script>

</body>
<!-- Cierre de página con imagen de agradecimiento -->
<footer style="width: 100%; max-width: 500px; margin: 40px auto; text-align: center;">
    <div class="seccion active" style="opacity: 1 !important; filter: none !important; transform: none !important;">
        <img src="img/footer.png" alt="Agradecimiento" style="width: 100%; height: auto; display: block;">
    </div>
</footer>

</html>
